
<!DOCTYPE html>
<html>
<head>
<title>Login</title>


<style>
*

{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Login Card */

.container{
    width:450px;
    background:#1e293b;
    border:1px solid #334155;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
    text-align:center;
    color:#ef4444;
    font-size:50px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

/* Form */

label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    background:#0f172a;
    border:1px solid #475569;
    border-radius:8px;
    color:white;
}

input:focus{
    outline:none;
    border-color:#ef4444;
}

/* Button */

button{
    width:100%;
    padding:14px;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#b91c1c;
}

/* Footer */

.footer{
    text-align:center;
    margin-top:25px;
    color:#94a3b8;
}

.footer a{
    color:#ef4444;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

.home-link{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
    text-decoration:none;
}

.home-link:hover{
    color:white;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🚨</div>

    <h1>Smart Emergency</h1>

    <p class="subtitle">
        Login to access the Emergency Response System
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>

        <input
            type="text"
            name="username"
            required
        >

        <label>Password</label>

        <input
            type="password"
            name="password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">

        Don't have an account?

        <a href="/register/">
            Register
        </a>

    </div>

    <a href="/" class="home-link">
        ← Back to Home
    </a>

</div>

</body>
</html>
